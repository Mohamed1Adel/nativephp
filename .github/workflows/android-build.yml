name: Build NativePHP Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, intl, zip, bcmath

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install NPM dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend assets
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare environment file
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          php artisan key:generate --force
          if grep -q "^NATIVEPHP_APP_ID=" .env; then
            sed -i "s/^NATIVEPHP_APP_ID=.*/NATIVEPHP_APP_ID=com.example.myapp/" .env
          else
            echo "NATIVEPHP_APP_ID=com.example.myapp" >> .env
          fi

      - name: Prepare NativePHP log directory
        run: mkdir -p nativephp

      - name: Install NativePHP Android project
        run: php artisan native:install android --no-interaction

      - name: Build Android APK
        run: |
          export NATIVEPHP_XCODE_BUILD=false
          php artisan native:package android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            **/*.apk
            **/build/**/*.apk